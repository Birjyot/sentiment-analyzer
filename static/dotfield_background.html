<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f172a;
    }
    .dot-field-container {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="dot-field-container" id="root">
    <canvas id="dot-canvas"></canvas>
    <svg id="dot-svg">
      <defs>
        <radialGradient id="dot-field-glow">
          <stop offset="0%" stop-color="#120F17" />
          <stop offset="100%" stop-color="transparent" />
        </radialGradient>
      </defs>
      <circle id="dot-glow" cx="-9999" cy="-9999" r="160" fill="url(#dot-field-glow)" style="opacity:0;will-change:opacity" />
    </svg>
  </div>
  <script>
    (function () {
      const TWO_PI = Math.PI * 2;
      const props = {
        dotRadius: 1.5,
        dotSpacing: 14,
        cursorRadius: 500,
        cursorForce: 0.1,
        bulgeOnly: true,
        bulgeStrength: 67,
        sparkle: false,
        waveAmplitude: 2,
        gradientFrom: 'rgba(99, 102, 241, 0.35)',
        gradientTo: 'rgba(139, 92, 246, 0.22)',
        glowRadius: 160,
      };

      const canvas = document.getElementById('dot-canvas');
      const glowEl = document.getElementById('dot-glow');
      const ctx = canvas.getContext('2d', { alpha: true });
      const dpr = Math.min(window.devicePixelRatio || 1, 2);

      let dots = [];
      const mouse = { x: -9999, y: -9999, prevX: -9999, prevY: -9999, speed: 0 };
      let size = { w: 0, h: 0, offsetX: 0, offsetY: 0 };
      let glowOpacity = 0;
      let engagement = 0;
      let frameCount = 0;
      let rafId = null;
      let resizeTimer = null;

      function buildDots(w, h) {
        const step = props.dotRadius + props.dotSpacing;
        const cols = Math.floor(w / step);
        const rows = Math.floor(h / step);
        const padX = (w % step) / 2;
        const padY = (h % step) / 2;
        dots = [];
        for (let row = 0; row < rows; row++) {
          for (let col = 0; col < cols; col++) {
            const ax = padX + col * step + step / 2;
            const ay = padY + row * step + step / 2;
            dots.push({ ax, ay, sx: ax, sy: ay, vx: 0, vy: 0, x: ax, y: ay });
          }
        }
      }

      function doResize() {
        const rect = document.body.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width = w + 'px';
        canvas.style.height = h + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        size = { w, h, offsetX: rect.left + window.scrollX, offsetY: rect.top + window.scrollY };
        buildDots(w, h);
      }

      function onResize() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(doResize, 100);
      }

      function onMouseMove(e) {
        mouse.x = e.pageX - size.offsetX;
        mouse.y = e.pageY - size.offsetY;
      }

      function updateMouseSpeed() {
        const dx = mouse.prevX - mouse.x;
        const dy = mouse.prevY - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        mouse.speed += (dist - mouse.speed) * 0.5;
        if (mouse.speed < 0.001) mouse.speed = 0;
        mouse.prevX = mouse.x;
        mouse.prevY = mouse.y;
      }

      function tick() {
        frameCount++;
        const len = dots.length;
        const t = frameCount * 0.02;
        const { w, h } = size;

        const targetEngagement = Math.min(mouse.speed / 5, 1);
        engagement += (targetEngagement - engagement) * 0.06;
        if (engagement < 0.001) engagement = 0;
        const eng = engagement;

        glowOpacity += (eng - glowOpacity) * 0.08;
        glowEl.setAttribute('cx', mouse.x);
        glowEl.setAttribute('cy', mouse.y);
        glowEl.style.opacity = glowOpacity;

        ctx.clearRect(0, 0, w, h);
        const grad = ctx.createLinearGradient(0, 0, w, h);
        grad.addColorStop(0, props.gradientFrom);
        grad.addColorStop(1, props.gradientTo);
        ctx.fillStyle = grad;

        const cr = props.cursorRadius;
        const crSq = cr * cr;
        const rad = props.dotRadius / 2;
        const isBulge = props.bulgeOnly;

        ctx.beginPath();
        for (let i = 0; i < len; i++) {
          const d = dots[i];
          const dx = mouse.x - d.ax;
          const dy = mouse.y - d.ay;
          const distSq = dx * dx + dy * dy;

          if (distSq < crSq && eng > 0.01) {
            const dist = Math.sqrt(distSq);
            if (isBulge) {
              const tb = 1 - dist / cr;
              const push = tb * tb * props.bulgeStrength * eng;
              const angle = Math.atan2(dy, dx);
              d.sx += (d.ax - Math.cos(angle) * push - d.sx) * 0.15;
              d.sy += (d.ay - Math.sin(angle) * push - d.sy) * 0.15;
            } else {
              const angle = Math.atan2(dy, dx);
              const move = (500 / dist) * (mouse.speed * props.cursorForce);
              d.vx += Math.cos(angle) * -move;
              d.vy += Math.sin(angle) * -move;
            }
          } else if (isBulge) {
            d.sx += (d.ax - d.sx) * 0.1;
            d.sy += (d.ay - d.sy) * 0.1;
          }

          if (!isBulge) {
            d.vx *= 0.9;
            d.vy *= 0.9;
            d.x = d.ax + d.vx;
            d.y = d.ay + d.vy;
            d.sx += (d.x - d.sx) * 0.1;
            d.sy += (d.y - d.sy) * 0.1;
          }

          let drawX = d.sx;
          let drawY = d.sy;
          if (props.waveAmplitude > 0) {
            drawY += Math.sin(d.ax * 0.03 + t) * props.waveAmplitude;
            drawX += Math.cos(d.ay * 0.03 + t * 0.7) * props.waveAmplitude * 0.5;
          }

          if (props.sparkle) {
            const hash = ((i * 2654435761) ^ (frameCount >> 3)) >>> 0;
            const r = (hash % 100) < 3 ? rad * 1.8 : rad;
            ctx.moveTo(drawX + r, drawY);
            ctx.arc(drawX, drawY, r, 0, TWO_PI);
          } else {
            ctx.moveTo(drawX + rad, drawY);
            ctx.arc(drawX, drawY, rad, 0, TWO_PI);
          }
        }
        ctx.fill();
        rafId = requestAnimationFrame(tick);
      }

      doResize();
      window.addEventListener('resize', onResize);
      window.addEventListener('mousemove', onMouseMove, { passive: true });
      setInterval(updateMouseSpeed, 20);
      rafId = requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
